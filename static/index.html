<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faz cifra!</title>

    <style>

        *{
            background-color: #212121;
        }

        body{
            align-items: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 20px;
            background-color: #212121
        }

        header{
            display: flex;
            width: 100%;
            gap: 50px;
            justify-content: center;
            align-items: center;
            height: 100px;
        }

        input{
            background-color: #303030; 
            color: white;
            padding-left: 10px;
            width: 100%;
            font-size: large;
            height: 50px;
            justify-self: center;
            border-radius: 15px;
            border: none;
            transition: 0.2s;
        }

        input:hover{
            transform: scale(1.05);
        }

        button{
            background-color: rgb(234 88 12);
            border-radius: 15px;
            width: 20%;
            height: 40%;
            border: none;
            align-self: center;
            justify-self: center;
            transition: 0.2s;
            cursor: pointer;
        }

        button:hover{
            background-color: rgb(224 78 2);
            transform: scale(1.05);
        }

        .entrada{
            display: flex;
            width: 50%;
            height: 100%;
            gap: 10px;
        }

        .cifra{
            display: none;
            /* display: flex; */
            flex-direction: column;
            width: 600px;
            background-color: #171717;
            justify-content: center;
            border: 5px solid #303030;
            border-radius: 15px;
            align-items: center;
            height: 100%;
            transition: 0.2s;
        }

        .cifra:hover{
            transform: scale(1.05);
        }

        .btns-cifra{
            width: 100%;
            display: flex;
            background-color: #171717;
            align-items: center;
            justify-content: space-between;
        }

        .gerar{
            width: 20vw;
            height: 5vh;
        }

        .class-btn-cifra-esquerdo{
            display: flex;
            font-family: Arial, Helvetica, sans-serif;
            font-weight: 100;
            justify-content: center;
            align-items: center;
            background-color: #171717;
            color: #f3f3f3;
            width: 100%;
            font-size: small;
        }

        .class-btn-cifra-esquerdo{
            display: flex;
            font-family: Arial, Helvetica, sans-serif;
            font-weight: 100;
            justify-content: start;
            align-items: center;
            background-color: #171717;
            color: #f3f3f3;
            width: 100%;
            font-size: small;
        }

        .class-btn-cifra-direito{
            display: flex;
            font-family: Arial, Helvetica, sans-serif;
            font-weight: 100;
            justify-content: end;
            align-items: center;
            background-color: #171717;
            color: #f3f3f3;
            width: 100%;
            font-size: small;
        }

        .class-btn-cifra-esquerdo:hover{
            background: none;
        }

        .class-btn-cifra-direito:hover{
            background: none;
        }

        pre{
            display: flex;
            background-color: #171717;
            width: 100%;
            justify-content: center;
            color: white;
            font-size: 20px;
            border-radius: 15px;
            height: 100%;
            transition: 0.2s;
        }

        img{
            width: 15px;
            background: none;
            margin-right: 5px;
            height: 100%;
        }

        .baixar{
            width: 13px;
        }


        @media (max-width: 650px) {
            .entrada{
                width: 90%;
            }

            button{
                width: 40%;
                height: 40%;
            }

            .gerar{
                width: 30vw;
            }

            .cifra{
                width: 90vw;
            }

            pre{
                font-size: 3.2vw;
                max-width: 90vw;
            }
        }

    </style>
</head>
<body>

    <header>
        <button onclick="gerar()">Gerar cifra</button>
        <button onclick="copiar()">Copiar cifra</button>
        <button onclick="baixar()">baixar cifra</button>
    </header>

    <div class="entrada">
            <input placeholder="Cole aqui a url da cifra da musica:" type="text" id="url">
    </div>
    <button class="gerar" onclick="gerar()">Gerar cifra</button>


    <div class="cifra" id="cifra">
        <div class="btns-cifra">
            <button class="class-btn-cifra-esquerdo" onclick="copiar()"><img src="img/copy.png"> Copiar</button>
            <button class="class-btn-cifra-direito" onclick="baixar()"><img class="baixar" src="img/download.png" alt=""> baixar</button>
        </div>
        <pre id="saida"></pre>
    </div>
</body>
<script>
let fileid = null

async function gerar() {
    const url = document.getElementById("url").value

    if (url == "") {
        return
    }
    const res = await fetch("/executar", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            url: url
        })
    })

    const data = await res.json()
    document.getElementById("saida").innerText = data.resultado
    fileid = data.file_id
    console.log(fileid)

    const cifra = document.getElementById("cifra")
    cifra.style.display = "flex"
}

function baixar() {
    if (!fileid) {
        alert("Coloque o link da cifra da música primeiro")
        return
    }
    console.log("baixando")
    window.location.href = `/baixar/${fileid}`
    fileid = null

    cifra.style.display = "none"
    document.getElementById("saida").innerText = ""
}

function copiar(){
    const texto = document.getElementById("saida").innerText

    navigator.clipboard.writeText(texto)
}
</script>
</html>
